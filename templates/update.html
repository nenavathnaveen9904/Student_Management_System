<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; margin-top: 60px; background: #f0f0f0; }
        .box { background: white; padding: 30px 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); width: 340px; }
        h2 { margin-bottom: 20px; }
        label { font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 8px; margin: 6px 0 14px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #1e88e5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #1565c0; }
        a { margin-left: 12px; color: #555; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Update Student</h2>
        <!-- Prefill form with current student data -->
        <form method="POST">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ student['name'] }}" required>

            <label>Branch</label>
            <input type="text" name="branch" value="{{ student['branch'] }}" required>

            <label>Age</label>
            <input type="number" name="age" min="10" max="100" value="{{ student['age'] }}" required>

            <label>Email</label>
            <input type="email" name="email" value="{{ student['email'] }}" required>

            <label>Phone Number</label>
            <input type="tel" name="phone" value="{{ student['phone'] }}" pattern="[0-9]{10}" title="Enter 10-digit phone number" required>

            <label>CGPA</label>
            <input type="number" name="cgpa" step="0.01" min="0" max="10" value="{{ student['cgpa'] }}" required>

            <button type="submit">Save Changes</button>
            <a href="/dashboard">Cancel</a>
        </form>
    </div>
</body>
</html>
