<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; margin-top: 60px; background: #f0f0f0; }
        .box { background: white; padding: 30px 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); width: 340px; }
        h2 { margin-bottom: 20px; }
        label { font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 8px; margin: 6px 0 14px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #45a049; }
        a { margin-left: 12px; color: #555; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Add New Student</h2>
        <form method="POST">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="e.g. Ravi Kumar" required>

            <label>Branch</label>
            <input type="text" name="branch" placeholder="e.g. Computer Science" required>

            <label>Age</label>
            <input type="number" name="age" min="10" max="100" placeholder="e.g. 20" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="e.g. ravi@example.com" required>

            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="e.g. 9876543210" pattern="[0-9]{10}" title="Enter 10-digit phone number" required>

            <label>CGPA</label>
            <input type="number" name="cgpa" step="0.01" min="0" max="10" placeholder="e.g. 8.75" required>

            <button type="submit">Add Student</button>
            <a href="/dashboard">Cancel</a>
        </form>
    </div>
</body>
</html>
